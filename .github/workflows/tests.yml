name: Tests
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install numpy scipy pandas hmmlearn filterpy statsmodels scikit-learn pytest
      - run: pytest tests/ -v
